<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEP - Dashboard de Gestores</title>
    <meta name="description" content="Dashboard analítico completo para gestores da plataforma NEP">
    <link rel="icon" type="image/png" href="NEP. IMAGEM.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a1f35;
            --bg-elevated: #222842;
            --border: rgba(139, 92, 246, 0.15);
            --border-bright: rgba(139, 92, 246, 0.35);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            --accent: #8b5cf6;
            --accent-light: #a78bfa;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .dashboard-wrapper {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .dash-header-left h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dash-header-left p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .dash-filters {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .dash-select,
        .dash-input {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 16px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .dash-select:focus,
        .dash-input:focus {
            border-color: var(--accent);
        }

        .dash-btn {
            background: linear-gradient(135deg, var(--accent), #6366f1);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dash-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.3);
        }

        .dash-btn.ghost {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
        }

        .dash-btn.ghost:hover {
            border-color: var(--accent);
            background: rgba(139, 92, 246, 0.1);
        }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
            border-color: var(--border-bright);
        }

        .kpi-card .kpi-icon {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .kpi-card .kpi-value {
            font-size: 36px;
            font-weight: 800;
        }

        .kpi-card .kpi-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .kpi-card .kpi-sub {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .kpi-card.accent {
            border-left: 4px solid var(--accent);
        }

        .kpi-card.success {
            border-left: 4px solid var(--success);
        }

        .kpi-card.warning {
            border-left: 4px solid var(--warning);
        }

        .kpi-card.danger {
            border-left: 4px solid var(--danger);
        }

        .kpi-card.info {
            border-left: 4px solid var(--info);
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .content-grid.full {
            grid-template-columns: 1fr;
        }

        @media (max-width: 900px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            overflow: hidden;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .card-title i {
            color: var(--accent);
        }

        /* Table */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table thead th {
            text-align: left;
            padding: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid var(--border);
            white-space: nowrap;
            cursor: pointer;
        }

        .data-table thead th:hover {
            color: var(--accent);
        }

        .data-table tbody td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            vertical-align: middle;
        }

        .data-table tbody tr:hover {
            background: rgba(139, 92, 246, 0.05);
        }

        .user-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 12px;
            flex-shrink: 0;
        }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.online {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .badge.recent {
            background: rgba(59, 130, 246, 0.2);
            color: var(--info);
        }

        .badge.away {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .badge.offline {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .module-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .module-tag {
            background: rgba(139, 92, 246, 0.12);
            color: var(--accent-light);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 500;
        }

        /* Bar chart inline */
        .bar-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .bar-label {
            width: 120px;
            font-size: 13px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .bar-track {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .bar-value {
            width: 50px;
            font-size: 13px;
            font-weight: 600;
            text-align: right;
            flex-shrink: 0;
        }

        /* Heatmap */
        .heatmap-grid {
            display: grid;
            grid-template-columns: 60px repeat(24, 1fr);
            gap: 2px;
            font-size: 10px;
        }

        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            min-height: 16px;
        }

        .heatmap-label {
            display: flex;
            align-items: center;
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 11px;
        }

        .heatmap-hour {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 9px;
        }

        /* Login history  */
        .login-timeline {
            max-height: 400px;
            overflow-y: auto;
        }

        .login-entry {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 13px;
        }

        .login-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* Loading */
        .loading-overlay {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Export */
        .export-bar {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* Responsive table */
        .table-wrapper {
            overflow-x: auto;
        }

        @media (max-width: 600px) {
            .dashboard-wrapper {
                padding: 12px;
            }

            .dash-header h1 {
                font-size: 22px;
            }

            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .kpi-card .kpi-value {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-wrapper">
        <!-- Header -->
        <div class="dash-header">
            <div class="dash-header-left">
                <h1><i class="fa-solid fa-chart-line"></i> Dashboard de Gestores</h1>
                <p id="dash-subtitle">Carregando dados...</p>
            </div>
            <div class="dash-filters">
                <select class="dash-select" id="filter-month">
                    <option value="all">Todos os meses</option>
                </select>
                <input type="text" class="dash-input" id="filter-name" placeholder="🔍 Buscar por nome..."
                    style="width: 200px;" />
                <button class="dash-btn ghost" onclick="exportCSV()"><i class="fa-solid fa-download"></i> Exportar
                    CSV</button>
                <button class="dash-btn ghost" onclick="loadDashboard()"><i class="fa-solid fa-sync"></i></button>
                <a href="index.html" class="dash-btn ghost"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
            </div>
        </div>

        <!-- Content -->
        <div id="dashboard-content">
            <div class="loading-overlay">
                <div class="spinner"></div>
                <p>Carregando analytics...</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCqwJ64SjXQf_ekZhRZcF4nN_Fqhwvxi_Q",
            authDomain: "ecossistema-nep.firebaseapp.com",
            projectId: "ecossistema-nep",
            storageBucket: "ecossistema-nep.firebasestorage.app",
            messagingSenderId: "1041112586342",
            appId: "1:1041112586342:web:0b7dc02b242cd3dbe635a7"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // State
        let allData = { users: [], analytics: [], points: [], tasks: [], rotinas: [] };
        let filteredUsers = [];

        // ═══════════════════════════════════════
        // LOAD DATA
        // ═══════════════════════════════════════
        /**
         * Aguarda o Firebase Auth restaurar sessão do IndexedDB
         */
        function waitForAuth() {
            return new Promise((resolve) => {
                const unsub = firebase.auth().onAuthStateChanged(user => {
                    unsub();
                    resolve(user);
                });
                // Timeout de 3s — se não restaurar, resolve null
                setTimeout(() => resolve(null), 3000);
            });
        }

        /**
         * Mostra mini formulário de login embutido na página
         */
        function showLoginForm(errorMsg = '') {
            const content = document.getElementById('dashboard-content');
            content.innerHTML = `
                <div class="loading-overlay" style="max-width: 400px; margin: 0 auto;">
                    <div style="font-size: 48px;">🔐</div>
                    <h2 style="margin: 0; font-size: 20px;">Acesso de Gestor</h2>
                    <p style="color: var(--text-secondary); font-size: 13px; text-align: center;">
                        Faça login com suas credenciais para acessar o dashboard
                    </p>
                    ${errorMsg ? `<p style="color: var(--danger); font-size: 13px;">⚠️ ${errorMsg}</p>` : ''}
                    <div style="width: 100%; display: flex; flex-direction: column; gap: 12px; margin-top: 8px;">
                        <input type="email" id="dash-email" class="dash-input" placeholder="📧 Email" style="width: 100%;" />
                        <input type="password" id="dash-password" class="dash-input" placeholder="🔑 Senha" style="width: 100%;" />
                        <button class="dash-btn" style="width: 100%; justify-content: center;" onclick="dashLogin()">
                            <i class="fa-solid fa-sign-in-alt"></i> Entrar
                        </button>
                    </div>
                </div>
            `;
            // Enter para login
            document.getElementById('dash-password')?.addEventListener('keypress', e => {
                if (e.key === 'Enter') dashLogin();
            });
        }

        /**
         * Login direto na página do dashboard
         */
        async function dashLogin() {
            const email = document.getElementById('dash-email')?.value?.trim();
            const password = document.getElementById('dash-password')?.value;
            if (!email || !password) return showLoginForm('Preencha email e senha');

            const content = document.getElementById('dashboard-content');
            content.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><p>Autenticando...</p></div>';

            try {
                await firebase.auth().signInWithEmailAndPassword(email, password);
                loadDashboard();
            } catch (err) {
                console.error('Login error:', err);
                let msg = 'Credenciais inválidas';
                if (err.code === 'auth/user-not-found') msg = 'Usuário não encontrado';
                if (err.code === 'auth/wrong-password') msg = 'Senha incorreta';
                if (err.code === 'auth/too-many-requests') msg = 'Muitas tentativas. Aguarde.';
                showLoginForm(msg);
            }
        }

        async function loadDashboard() {
            const content = document.getElementById('dashboard-content');
            content.innerHTML = '<div class="loading-overlay"><div class="spinner"></div><p>Carregando analytics...</p></div>';

            try {
                // Esperar a sessão ser restaurada
                let user = firebase.auth().currentUser;
                if (!user) {
                    user = await waitForAuth();
                }

                // Se ainda não tem user, mostrar login
                if (!user) {
                    showLoginForm();
                    return;
                }

                const [usersSnap, analyticsSnap, pointsSnap, tasksSnap, rotinasSnap] = await Promise.all([
                    db.collection('users').get(),
                    db.collection('user_analytics').orderBy('timestamp', 'desc').limit(5000).get(),
                    db.collection('user_points').get(),
                    db.collection('tasks').get(),
                    db.collection('rotinas_adm').orderBy('data', 'desc').limit(500).get()
                ]);

                allData.users = usersSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
                allData.analytics = analyticsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                allData.points = pointsSnap.docs.map(d => ({ uid: d.id, ...d.data() }));
                allData.tasks = tasksSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                allData.rotinas = rotinasSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                populateFilters();
                renderDashboard();
            } catch (err) {
                console.error('Erro:', err);
                if (err.message?.includes('permission')) {
                    showLoginForm('Sessão expirada. Faça login novamente.');
                } else {
                    content.innerHTML = `
                        <div class="loading-overlay">
                            <div style="font-size: 48px;">⚠️</div>
                            <p>Erro ao carregar dados: ${err.message}</p>
                            <button class="dash-btn" onclick="loadDashboard()"><i class="fa-solid fa-sync"></i> Tentar novamente</button>
                        </div>`;
                }
            }
        }

        // ═══════════════════════════════════════
        // FILTERS
        // ═══════════════════════════════════════
        function populateFilters() {
            const monthSelect = document.getElementById('filter-month');
            const months = new Set();
            allData.analytics.forEach(a => {
                if (a.date) months.add(a.date.substring(0, 7)); // YYYY-MM
            });

            const sorted = [...months].sort().reverse();
            monthSelect.innerHTML = '<option value="all">Todos os meses</option>';
            sorted.forEach(m => {
                const [y, mo] = m.split('-');
                const label = new Date(y, mo - 1).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
                monthSelect.innerHTML += `<option value="${m}">${label}</option>`;
            });

            monthSelect.onchange = renderDashboard;
            document.getElementById('filter-name').oninput = renderDashboard;
        }

        function getFilteredAnalytics() {
            const month = document.getElementById('filter-month').value;
            let filtered = allData.analytics;
            if (month !== 'all') {
                filtered = filtered.filter(a => a.date?.startsWith(month));
            }
            return filtered;
        }

        // ═══════════════════════════════════════
        // RENDER
        // ═══════════════════════════════════════
        function renderDashboard() {
            const content = document.getElementById('dashboard-content');
            const analytics = getFilteredAnalytics();
            const nameFilter = document.getElementById('filter-name').value.toLowerCase().trim();

            // Build user profiles
            const userProfiles = buildUserProfiles(analytics, nameFilter);
            filteredUsers = userProfiles;

            // KPIs
            const totalUsers = allData.users.length;
            const activeUsers = new Set(analytics.map(a => a.uid)).size;
            const totalSessions = analytics.filter(a => a.event_type === 'LOGIN' || a.event_type === 'MODULE_VIEW').length;
            const uniqueModules = new Set(analytics.map(a => a.module_id).filter(Boolean)).size;
            const avgSessionsPerUser = activeUsers > 0 ? (totalSessions / activeUsers).toFixed(1) : 0;

            // Users inactive 7+ days
            const now = new Date();
            const inactiveCount = userProfiles.filter(u => {
                if (!u.lastAccess) return true;
                const diff = (now - u.lastAccess) / (1000 * 60 * 60 * 24);
                return diff > 7;
            }).length;

            // Module ranking
            const moduleCounts = {};
            analytics.forEach(a => {
                if (a.module_id) {
                    moduleCounts[a.module_id] = (moduleCounts[a.module_id] || 0) + 1;
                }
            });
            const moduleRanking = Object.entries(moduleCounts)
                .map(([module, count]) => ({ module, count }))
                .sort((a, b) => b.count - a.count);

            // Heatmap
            const heatmap = buildHeatmap(analytics);

            // Daily logins (last 30 days)
            const dailyLogins = buildDailyLogins(analytics);

            // Month label
            const monthVal = document.getElementById('filter-month').value;
            const periodLabel = monthVal === 'all' ? 'Todo o período' : document.getElementById('filter-month').selectedOptions[0].text;

            document.getElementById('dash-subtitle').textContent = `${periodLabel} • ${totalUsers} usuários cadastrados • Atualizado agora`;

            content.innerHTML = `
                <!-- KPIs -->
                <div class="kpi-grid">
                    <div class="kpi-card accent">
                        <div class="kpi-icon">👥</div>
                        <div class="kpi-value">${activeUsers}</div>
                        <div class="kpi-label">Usuários Ativos</div>
                        <div class="kpi-sub">de ${totalUsers} cadastrados</div>
                    </div>
                    <div class="kpi-card info">
                        <div class="kpi-icon">🔑</div>
                        <div class="kpi-value">${totalSessions}</div>
                        <div class="kpi-label">Total de Acessos</div>
                        <div class="kpi-sub">${avgSessionsPerUser} média/usuário</div>
                    </div>
                    <div class="kpi-card success">
                        <div class="kpi-icon">📦</div>
                        <div class="kpi-value">${uniqueModules}</div>
                        <div class="kpi-label">Módulos Acessados</div>
                        <div class="kpi-sub">módulos diferentes</div>
                    </div>
                    <div class="kpi-card warning">
                        <div class="kpi-icon">⏱️</div>
                        <div class="kpi-value">${avgSessionsPerUser}</div>
                        <div class="kpi-label">Acessos/Usuário</div>
                        <div class="kpi-sub">média por pessoa</div>
                    </div>
                    <div class="kpi-card danger">
                        <div class="kpi-icon">😴</div>
                        <div class="kpi-value">${inactiveCount}</div>
                        <div class="kpi-label">Inativos +7 dias</div>
                        <div class="kpi-sub">${totalUsers > 0 ? Math.round(inactiveCount / totalUsers * 100) : 0}% do total</div>
                    </div>
                </div>

                <!-- Users Table -->
                <div class="content-grid full">
                    <div class="card">
                        <div class="card-title"><i class="fa-solid fa-users"></i> Detalhamento por Usuário (${userProfiles.length})</div>
                        <div class="table-wrapper">
                            <table class="data-table" id="users-table">
                                <thead>
                                    <tr>
                                        <th onclick="sortTable('name')">Nome ↕</th>
                                        <th onclick="sortTable('totalAccess')">Acessos ↕</th>
                                        <th onclick="sortTable('lastAccess')">Último Acesso ↕</th>
                                        <th onclick="sortTable('daysAgo')">Dias sem Acesso ↕</th>
                                        <th>Módulos Acessados</th>
                                        <th onclick="sortTable('points')">Pontos ↕</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${userProfiles.map(u => renderUserRow(u)).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Module Ranking + Heatmap -->
                <div class="content-grid">
                    <div class="card">
                        <div class="card-title"><i class="fa-solid fa-ranking-star"></i> Ranking de Módulos</div>
                        ${renderModuleRanking(moduleRanking)}
                    </div>
                    <div class="card">
                        <div class="card-title"><i class="fa-solid fa-fire"></i> Mapa de Calor — Horários de Acesso</div>
                        ${renderHeatmap(heatmap)}
                    </div>
                </div>

                <!-- Daily Logins Chart -->
                <div class="content-grid full">
                    <div class="card">
                        <div class="card-title"><i class="fa-solid fa-chart-bar"></i> Acessos Diários (últimos 30 dias)</div>
                        <div style="display: flex; align-items: flex-end; gap: 4px; height: 160px; padding: 0 8px;">
                            ${dailyLogins.map(d => `
                                <div style="flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%;">
                                    <div style="flex: 1; display: flex; align-items: flex-end; width: 100%;">
                                        <div style="width: 100%; background: linear-gradient(180deg, var(--accent), #6366f1); border-radius: 4px 4px 0 0; height: ${d.pct}%; min-height: 2px; transition: height 0.3s;" title="${d.count} acessos em ${d.label}"></div>
                                    </div>
                                    <div style="font-size: 9px; color: var(--text-tertiary); margin-top: 4px; writing-mode: vertical-rl; text-orientation: mixed; height: 40px;">${d.shortLabel}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        // ═══════════════════════════════════════
        // BUILD USER PROFILES
        // ═══════════════════════════════════════
        function buildUserProfiles(analytics, nameFilter) {
            const profileMap = {};

            // Init from users collection
            allData.users.forEach(u => {
                const name = u.nome || u.name || 'Sem Nome';
                if (nameFilter && !name.toLowerCase().includes(nameFilter)) return;

                profileMap[u.uid] = {
                    uid: u.uid,
                    name: name,
                    email: u.email || '',
                    role: u.cargo || u.role || '',
                    totalAccess: 0,
                    lastAccess: null,
                    daysAgo: 999,
                    modules: new Set(),
                    points: 0
                };
            });

            // Enrich from analytics
            analytics.forEach(a => {
                if (!profileMap[a.uid]) return;
                const p = profileMap[a.uid];
                p.totalAccess++;
                if (a.module_id) p.modules.add(a.module_id);

                const ts = a.timestamp?.toDate?.() || (a.date ? new Date(a.date) : null);
                if (ts && (!p.lastAccess || ts > p.lastAccess)) {
                    p.lastAccess = ts;
                }
            });

            // Enrich from points
            allData.points.forEach(pt => {
                if (profileMap[pt.uid]) {
                    profileMap[pt.uid].points = pt.total_points || 0;
                }
            });

            // Calculate days ago
            const now = new Date();
            Object.values(profileMap).forEach(p => {
                if (p.lastAccess) {
                    p.daysAgo = Math.floor((now - p.lastAccess) / (1000 * 60 * 60 * 24));
                }
                p.modulesArray = [...p.modules];
            });

            return Object.values(profileMap).sort((a, b) => a.daysAgo - b.daysAgo);
        }

        // ═══════════════════════════════════════
        // RENDER HELPERS
        // ═══════════════════════════════════════
        function renderUserRow(u) {
            const initials = u.name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
            const lastAccessStr = u.lastAccess
                ? u.lastAccess.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' }) + ' ' + u.lastAccess.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
                : 'Nunca';

            let statusClass = 'offline';
            let statusText = 'Inativo';
            if (u.daysAgo === 0) { statusClass = 'online'; statusText = 'Hoje'; }
            else if (u.daysAgo <= 1) { statusClass = 'recent'; statusText = 'Ontem'; }
            else if (u.daysAgo <= 7) { statusClass = 'away'; statusText = `${u.daysAgo}d atrás`; }
            else { statusText = `${u.daysAgo}d`; }

            const moduleLabels = {
                dashboard: '🏠 Dashboard', kanban: '📋 Kanban', calendar: '📅 Agenda',
                forum: '💬 Fórum', tools: '🛠️ Ferramentas', reports: '📊 Relatórios',
                profile: '👤 Perfil', admin: '⚙️ Admin', scoring: '🏆 Scoring',
                checklist: '✅ Rotina', tickets: '🎫 Tickets', announcements: '📢 Avisos',
                testimonials: '💌 Testem.', bonus: '🎁 Bônus'
            };

            return `
                <tr>
                    <td>
                        <div class="user-cell">
                            <div class="user-avatar">${initials}</div>
                            <div>
                                <div style="font-weight: 600;">${u.name}</div>
                                <div style="font-size: 11px; color: var(--text-tertiary);">${u.role || u.email}</div>
                            </div>
                        </div>
                    </td>
                    <td style="font-weight: 700; color: var(--accent);">${u.totalAccess}</td>
                    <td style="font-size: 12px;">${lastAccessStr}</td>
                    <td style="font-weight: 600; color: ${u.daysAgo <= 1 ? 'var(--success)' : u.daysAgo <= 7 ? 'var(--warning)' : 'var(--danger)'};">${u.daysAgo === 999 ? 'Nunca' : u.daysAgo + 'd'}</td>
                    <td>
                        <div class="module-tags">
                            ${u.modulesArray.slice(0, 5).map(m => `<span class="module-tag">${moduleLabels[m] || m}</span>`).join('')}
                            ${u.modulesArray.length > 5 ? `<span class="module-tag">+${u.modulesArray.length - 5}</span>` : ''}
                        </div>
                    </td>
                    <td style="font-weight: 600;">${u.points}</td>
                    <td><span class="badge ${statusClass}">${statusText}</span></td>
                </tr>
            `;
        }

        function renderModuleRanking(ranking) {
            if (ranking.length === 0) return '<p style="color: var(--text-tertiary);">Sem dados</p>';
            const max = ranking[0].count;
            const moduleLabels = {
                dashboard: '🏠 Dashboard', kanban: '📋 Kanban', calendar: '📅 Agenda',
                forum: '💬 Fórum', tools: '🛠️ Ferramentas', reports: '📊 Relatórios',
                profile: '👤 Perfil', admin: '⚙️ Admin', scoring: '🏆 Scoring',
                checklist: '✅ Rotina', tickets: '🎫 Tickets', announcements: '📢 Avisos',
                testimonials: '💌 Testemunhos', bonus: '🎁 Bônus'
            };

            const colors = ['#8b5cf6', '#6366f1', '#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#ec4899', '#06b6d4'];

            return ranking.slice(0, 10).map((m, i) => `
                <div class="bar-row">
                    <div class="bar-label">${moduleLabels[m.module] || m.module}</div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width: ${(m.count / max * 100)}%; background: ${colors[i % colors.length]};"></div>
                    </div>
                    <div class="bar-value">${m.count}</div>
                </div>
            `).join('');
        }

        function buildHeatmap(analytics) {
            const heatmap = Array(7).fill(null).map(() => Array(24).fill(0));
            analytics.forEach(a => {
                const ts = a.timestamp?.toDate?.();
                if (!ts) return;
                heatmap[ts.getDay()][ts.getHours()]++;
            });
            return heatmap;
        }

        function renderHeatmap(heatmap) {
            const days = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
            const maxVal = Math.max(...heatmap.flat(), 1);

            let html = '<div class="heatmap-grid">';
            // Header
            html += '<div></div>';
            for (let h = 0; h < 24; h++) {
                html += `<div class="heatmap-hour">${h}h</div>`;
            }
            // Rows
            for (let d = 0; d < 7; d++) {
                html += `<div class="heatmap-label">${days[d]}</div>`;
                for (let h = 0; h < 24; h++) {
                    const val = heatmap[d][h];
                    const intensity = val / maxVal;
                    const bg = intensity === 0 ? 'rgba(255,255,255,0.03)' : `rgba(139, 92, 246, ${0.15 + intensity * 0.85})`;
                    html += `<div class="heatmap-cell" style="background: ${bg};" title="${days[d]} ${h}h: ${val} acessos"></div>`;
                }
            }
            html += '</div>';
            return html;
        }

        function buildDailyLogins(analytics) {
            const days = [];
            const counts = {};
            const now = new Date();

            for (let i = 29; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(d.getDate() - i);
                const key = d.toISOString().split('T')[0];
                counts[key] = 0;
                days.push({
                    key,
                    label: d.toLocaleDateString('pt-BR'),
                    shortLabel: `${d.getDate()}/${d.getMonth() + 1}`
                });
            }

            analytics.forEach(a => {
                if (a.date && counts[a.date] !== undefined) {
                    counts[a.date]++;
                }
            });

            const max = Math.max(...Object.values(counts), 1);
            return days.map(d => ({
                ...d,
                count: counts[d.key],
                pct: (counts[d.key] / max * 100)
            }));
        }

        // ═══════════════════════════════════════
        // SORT TABLE
        // ═══════════════════════════════════════
        let currentSort = { field: 'daysAgo', asc: true };

        function sortTable(field) {
            if (currentSort.field === field) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.field = field;
                currentSort.asc = true;
            }

            filteredUsers.sort((a, b) => {
                let va = a[field], vb = b[field];
                if (typeof va === 'string') va = va.toLowerCase();
                if (typeof vb === 'string') vb = vb.toLowerCase();
                if (va < vb) return currentSort.asc ? -1 : 1;
                if (va > vb) return currentSort.asc ? 1 : -1;
                return 0;
            });

            const tbody = document.querySelector('#users-table tbody');
            if (tbody) {
                tbody.innerHTML = filteredUsers.map(u => renderUserRow(u)).join('');
            }
        }

        // ═══════════════════════════════════════
        // EXPORT CSV
        // ═══════════════════════════════════════
        function exportCSV() {
            if (!filteredUsers.length) return alert('Nenhum dado para exportar');

            const headers = ['Nome', 'Email', 'Cargo', 'Total Acessos', 'Último Acesso', 'Dias sem Acesso', 'Módulos Acessados', 'Pontos', 'Status'];
            const rows = filteredUsers.map(u => [
                u.name,
                u.email,
                u.role,
                u.totalAccess,
                u.lastAccess ? u.lastAccess.toLocaleString('pt-BR') : 'Nunca',
                u.daysAgo === 999 ? 'Nunca' : u.daysAgo,
                u.modulesArray.join(', '),
                u.points,
                u.daysAgo <= 1 ? 'Ativo' : u.daysAgo <= 7 ? 'Recente' : 'Inativo'
            ]);

            let csv = '\uFEFF'; // BOM for Excel
            csv += headers.join(';') + '\n';
            rows.forEach(r => {
                csv += r.map(v => `"${v}"`).join(';') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `dashboard_gestores_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ═══════════════════════════════════════
        // INIT
        // ═══════════════════════════════════════
        // Carregar direto ao abrir a página
        loadDashboard();
    </script>
</body>
