  <!-- Firebase Modules - Carrega e espera antes de continuar -->
  <script type="module">
    console.log('[Firebase Modules] Iniciando carregamento...');

    try {
      const { NexusAuthService } = await import('./js/auth-firebase.js?v=2');
      console.log('[Firebase Modules] ✅ auth-firebase.js carregado');

      const { AuditService } = await import('./js/audit-service.js?v=2');
      console.log('[Firebase Modules] ✅ audit-service.js carregado');

      const { UserManagement } = await import('./js/user-management.js?v=2');
      console.log('[Firebase Modules] ✅ user-management.js carregado');

      const { PointsService } = await import('./js/points-service.js?v=2');
      console.log('[Firebase Modules] ✅ points-service.js carregado');

      const { ModulePermissionService } = await import('./js/module-permission-service.js?v=3');
      console.log('[Firebase Modules] ✅ module-permission-service.js carregado');

      const { AnalyticsService } = await import('./js/analytics-service.js?v=2');
      console.log('[Firebase Modules] ✅ analytics-service.js carregado');

      // Expor globalmente
      window.NexusAuthService = NexusAuthService;
      window.AuditService = AuditService;
      window.UserManagement = UserManagement;
      window.PointsService = PointsService;
      window.ModulePermissionService = ModulePermissionService;
      window.AnalyticsService = AnalyticsService;

      // Inicializar permissões padrão (se necessário)
      await ModulePermissionService.initializeDefaultPermissions();

      // Disparar evento quando módulos estiverem prontos
      window.firebaseModulesLoaded = true;
      window.dispatchEvent(new Event('firebaseModulesReady'));
      console.log('[Firebase Modules] ✅ Todos os módulos carregados e expostos globalmente!');

    } catch (error) {
      console.error('[Firebase Modules] ❌ Erro ao carregar módulos:', error);
      console.error('[Firebase Modules] Arquivo que falhou:', error.message);
    }
  </script>
